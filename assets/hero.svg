<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 720" width="600" height="720" role="img" aria-label="Person relaxing with feet on the Renvia foot device in a warm living room">
  <defs>
    <linearGradient id="hbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FBFAF7"/><stop offset="1" stop-color="#F2F8F5"/></linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#F6D88C"/><stop offset="1" stop-color="#F6D88C" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="600" height="720" fill="url(#hbg)"/>
  <!-- window + warm light -->
  <rect x="372" y="70" width="170" height="210" rx="12" fill="#FCEFC9"/>
  <line x1="457" y1="70" x2="457" y2="280" stroke="#EBD9A6" stroke-width="6"/>
  <line x1="372" y1="172" x2="542" y2="172" stroke="#EBD9A6" stroke-width="6"/>
  <circle cx="500" cy="130" r="120" fill="url(#sun)"/>
  <!-- plant -->
  <rect x="70" y="430" width="58" height="76" rx="10" fill="#CE8C5A"/>
  <g fill="#0E7C66"><ellipse cx="86" cy="402" rx="16" ry="46" transform="rotate(-18 86 402)"/><ellipse cx="112" cy="398" rx="16" ry="50"/><ellipse cx="134" cy="406" rx="15" ry="42" transform="rotate(18 134 406)"/></g>
  <!-- floor -->
  <path d="M0 560 Q300 520 600 560 L600 720 L0 720 Z" fill="#BFE0D3"/>
  <!-- armchair -->
  <rect x="150" y="300" width="300" height="250" rx="40" fill="#0E7C66"/>
  <rect x="150" y="430" width="300" height="120" rx="36" fill="#0A5C4B"/>
  <rect x="132" y="360" width="46" height="180" rx="22" fill="#0A5C4B"/>
  <rect x="422" y="360" width="46" height="180" rx="22" fill="#0A5C4B"/>
  <!-- seated person silhouette -->
  <g fill="#2A3B38">
    <circle cx="300" cy="300" r="46"/>
    <path d="M250 340 Q300 318 350 340 L362 470 Q300 452 238 470 Z"/>
  </g>
  <!-- legs + bare feet extended to the device -->
  <g>
    <path d="M256 452 Q250 540 300 588 L348 612 Q356 596 344 584 L300 556 Q286 506 296 456 Z" fill="#2A3B38"/>
    <ellipse cx="372" cy="612" rx="40" ry="20" fill="#E8B58E"/>
    <ellipse cx="356" cy="600" rx="22" ry="14" fill="#E8B58E"/>
  </g>
  <!-- device pad under feet -->
  <rect x="300" y="624" width="180" height="46" rx="18" fill="#FFFFFF" stroke="#DCE6E1" stroke-width="2"/>
  <circle cx="390" cy="647" r="5" fill="#E3A93B"/>
  <!-- hand + remote -->
  <ellipse cx="436" cy="452" rx="22" ry="16" fill="#E8B58E"/>
  <rect x="452" y="436" width="40" height="64" rx="10" fill="#FFFFFF" stroke="#DCE6E1" stroke-width="2"/>
  <circle cx="472" cy="468" r="7" fill="#E8694A"/>
  <!-- "lighter" sparkles -->
  <g fill="#E3A93B" opacity="0.9"><circle cx="250" cy="600" r="4"/><circle cx="232" cy="566" r="3"/><circle cx="270" cy="556" r="3"/></g>
</svg>
