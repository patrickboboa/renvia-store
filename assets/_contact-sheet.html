<!DOCTYPE html><html><head><meta charset="utf-8"><style>
body{background:#FBFAF7;font-family:Segoe UI,Arial;margin:0;padding:28px;}
h2{font-family:Georgia;color:#0A5C4B;margin:0 0 18px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:1080px;}
.cell{background:#fff;border:1px solid #E3E0D7;border-radius:14px;overflow:hidden;}
.cell img{display:block;width:100%;}
.cap{font-size:13px;font-weight:700;color:#46554F;padding:10px 14px;}
.big{grid-column:1/2;}
</style></head><body>
<h2>Renvia — illustrated image set (contact sheet)</h2>
<div class="grid">
  <div class="cell big"><img src="hero.svg"><div class="cap">hero.svg — homepage hero</div></div>
  <div class="cell"><img src="product.svg"><div class="cap">product.svg — PDP hero / box</div></div>
  <div class="cell"><img src="feat-feet.svg"><div class="cap">feat-feet.svg</div></div>
  <div class="cell"><img src="feat-chair.svg"><div class="cap">feat-chair.svg</div></div>
  <div class="cell"><img src="feat-pads.svg"><div class="cap">feat-pads.svg</div></div>
  <div class="cell"><img src="feat-remote.svg"><div class="cap">feat-remote.svg</div></div>
</div>
</body></html>
