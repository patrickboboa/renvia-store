<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="Renvia Circulation Booster: foot platform, remote and body pads">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F2F8F5"/><stop offset="1" stop-color="#E9F3EF"/>
    </linearGradient>
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#EEF4F1"/>
    </linearGradient>
  </defs>
  <rect width="600" height="600" rx="28" fill="url(#bg)"/>
  <!-- soft shadow under platform -->
  <ellipse cx="300" cy="372" rx="210" ry="34" fill="#0A5C4B" opacity="0.10"/>
  <!-- platform -->
  <rect x="118" y="196" width="364" height="168" rx="34" fill="url(#plate)" stroke="#DCE6E1" stroke-width="2"/>
  <rect x="140" y="216" width="320" height="128" rx="24" fill="#F2F8F5"/>
  <!-- left foot -->
  <g fill="#0E7C66">
    <ellipse cx="232" cy="280" rx="40" ry="54"/>
    <circle cx="206" cy="236" r="9"/><circle cx="224" cy="230" r="10"/><circle cx="244" cy="231" r="9"/><circle cx="261" cy="237" r="8"/>
  </g>
  <!-- right foot -->
  <g fill="#0E7C66">
    <ellipse cx="368" cy="280" rx="40" ry="54"/>
    <circle cx="394" cy="236" r="9"/><circle cx="376" cy="230" r="10"/><circle cx="356" cy="231" r="9"/><circle cx="339" cy="237" r="8"/>
  </g>
  <!-- power pulse dots -->
  <circle cx="300" cy="300" r="6" fill="#E3A93B"/>
  <circle cx="276" cy="318" r="4" fill="#E8694A"/><circle cx="324" cy="318" r="4" fill="#E8694A"/>
  <!-- remote -->
  <g>
    <rect x="438" y="392" width="96" height="150" rx="20" fill="#FFFFFF" stroke="#DCE6E1" stroke-width="2"/>
    <rect x="456" y="410" width="60" height="34" rx="8" fill="#0A5C4B"/>
    <text x="486" y="433" font-family="Segoe UI, Arial" font-size="16" fill="#8FE0C8" text-anchor="middle" font-weight="700">99</text>
    <circle cx="471" cy="470" r="9" fill="#E8694A"/><circle cx="501" cy="470" r="9" fill="#0E7C66"/>
    <rect x="462" y="492" width="48" height="10" rx="5" fill="#E3E0D7"/>
    <rect x="462" y="510" width="48" height="10" rx="5" fill="#E3E0D7"/>
  </g>
  <!-- body pads -->
  <g>
    <rect x="70" y="404" width="86" height="86" rx="18" fill="#FFFFFF" stroke="#9CC3B2" stroke-width="3"/>
    <rect x="88" y="424" width="50" height="50" rx="12" fill="#E9F3EF"/>
    <rect x="92" y="436" width="120" height="6" rx="3" fill="#9CC3B2"/>
    <rect x="96" y="470" width="86" height="86" rx="18" fill="#FFFFFF" stroke="#9CC3B2" stroke-width="3"/>
    <rect x="114" y="490" width="50" height="50" rx="12" fill="#E9F3EF"/>
  </g>
</svg>
